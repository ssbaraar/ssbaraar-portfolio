<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0f1f"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="lav2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cor2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6b5b" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ff6b5b" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg2)"/>
  <ellipse cx="300" cy="200" rx="300" ry="200" fill="url(#lav2)"/>
  <ellipse cx="900" cy="450" rx="300" ry="200" fill="url(#cor2)"/>
  <!-- Three pillars -->
  <g transform="translate(180, 280)">
    <!-- LangGraph -->
    <rect x="0" y="0" width="240" height="240" rx="20" fill="#1c2128" stroke="#a78bfa" stroke-width="2"/>
    <text x="120" y="50" text-anchor="middle" fill="#a78bfa" font-family="sans-serif" font-size="14" font-weight="bold" letter-spacing="2">LANGGRAPH</text>
    <g transform="translate(40, 80)">
      <circle cx="20" cy="20" r="14" fill="#a78bfa"/>
      <circle cx="100" cy="20" r="14" fill="#a78bfa" opacity="0.7"/>
      <circle cx="160" cy="20" r="14" fill="#a78bfa" opacity="0.5"/>
      <line x1="20" y1="20" x2="100" y2="20" stroke="#a78bfa" stroke-width="2"/>
      <line x1="100" y1="20" x2="160" y2="20" stroke="#a78bfa" stroke-width="2" stroke-dasharray="4 4"/>
      <circle cx="60" cy="80" r="14" fill="#a78bfa" opacity="0.6"/>
      <line x1="20" y1="20" x2="60" y2="80" stroke="#a78bfa" stroke-width="1.5"/>
      <circle cx="140" cy="80" r="14" fill="#a78bfa" opacity="0.4"/>
      <line x1="100" y1="20" x2="140" y2="80" stroke="#a78bfa" stroke-width="1.5"/>
    </g>
    <text x="120" y="200" text-anchor="middle" fill="#e6edf3" font-family="sans-serif" font-size="14">Production-grade</text>
    <text x="120" y="222" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="12">state machine</text>
  </g>
  <g transform="translate(480, 280)">
    <!-- CrewAI -->
    <rect x="0" y="0" width="240" height="240" rx="20" fill="#1c2128" stroke="#84cc16" stroke-width="2"/>
    <text x="120" y="50" text-anchor="middle" fill="#84cc16" font-family="sans-serif" font-size="14" font-weight="bold" letter-spacing="2">CREWAI</text>
    <g transform="translate(50, 80)">
      <circle cx="20" cy="20" r="18" fill="#84cc16"/>
      <circle cx="100" cy="20" r="18" fill="#84cc16" opacity="0.7"/>
      <circle cx="60" cy="80" r="18" fill="#84cc16" opacity="0.5"/>
      <text x="20" y="26" text-anchor="middle" fill="#0d1117" font-family="sans-serif" font-size="11" font-weight="bold">R</text>
      <text x="100" y="26" text-anchor="middle" fill="#0d1117" font-family="sans-serif" font-size="11" font-weight="bold">W</text>
      <text x="60" y="86" text-anchor="middle" fill="#0d1117" font-family="sans-serif" font-size="11" font-weight="bold">M</text>
    </g>
    <text x="120" y="200" text-anchor="middle" fill="#e6edf3" font-family="sans-serif" font-size="14">Prototyping</text>
    <text x="120" y="222" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="12">fast &amp; friendly</text>
  </g>
  <g transform="translate(780, 280)">
    <!-- AutoGen -->
    <rect x="0" y="0" width="240" height="240" rx="20" fill="#1c2128" stroke="#ff6b5b" stroke-width="2"/>
    <text x="120" y="50" text-anchor="middle" fill="#ff6b5b" font-family="sans-serif" font-size="14" font-weight="bold" letter-spacing="2">AUTOGEN</text>
    <g transform="translate(50, 80)">
      <circle cx="20" cy="20" r="14" fill="#ff6b5b"/>
      <circle cx="100" cy="20" r="14" fill="#ff6b5b" opacity="0.7"/>
      <path d="M 20 30 Q 60 60 100 30" stroke="#ff6b5b" stroke-width="2" fill="none"/>
      <path d="M 100 30 Q 60 0 20 30" stroke="#ff6b5b" stroke-width="2" fill="none" opacity="0.5"/>
      <text x="60" y="80" text-anchor="middle" fill="#ff6b5b" font-family="sans-serif" font-size="20">💬</text>
    </g>
    <text x="120" y="200" text-anchor="middle" fill="#e6edf3" font-family="sans-serif" font-size="14">Research debate</text>
    <text x="120" y="222" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="12">conversational</text>
  </g>
  <!-- VS labels -->
  <text x="450" y="410" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="20" font-weight="bold">vs</text>
  <text x="750" y="410" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="20" font-weight="bold">vs</text>
  <!-- Title -->
  <text x="600" y="120" text-anchor="middle" fill="#f0f6fc" font-family="sans-serif" font-size="44" font-weight="bold">LangGraph vs CrewAI vs AutoGen</text>
  <text x="600" y="170" text-anchor="middle" fill="#a78bfa" font-family="sans-serif" font-size="22">When to use each one — my honest comparison</text>
</svg>
